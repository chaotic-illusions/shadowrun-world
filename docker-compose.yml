services:
  shadowrun-world:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./frontend:/app/frontend
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/shadowrun.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BOOTSTRAP_ADMIN_KEY=${BOOTSTRAP_ADMIN_KEY:-shadowrunner}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      # Set to 1 only when behind a reverse proxy that overwrites X-Forwarded-For.
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-}
    restart: unless-stopped
