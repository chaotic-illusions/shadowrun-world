<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTGs | Shadowrun World Engine</title>
  <link rel="stylesheet" href="style.css">
  <script src="shared.js"></script>
</head>
<body>

<header>
  <div class="logo">Shadowrun <em>//</em> <span class="text-cyan" style="text-shadow: var(--glow-cyan)">NA/UCAS-SEA-6A23D-PENUMBRA</span></div>
  <nav>
    <a href="world-state.html">World State</a>
    <a href="manage-characters.html">Characters</a>
    <a href="manage-organizations.html">Organizations</a>
    <a href="manage-locations.html">Locations</a>
    <a href="manage-rtgs.html" class="active">RTGs</a>
    <a href="manage-runs.html">Runs</a>
    <a href="manage-matrix.html">Matrix (SR1)</a>
    <a href="matrix-designer.html">Matrix Designer</a>
    <a href="matrix-run.html">Matrix Run</a>
    <a href="deck-builder.html">Deck Builder</a>
  </nav>
</header>

<main>
  <div class="page-title">&gt;&gt; Matrix Topology <em class="sep">//</em> Regional Telecommunications Grids</div>
  <div class="page-sub" style="color:var(--cyan)">NODE REGISTRY -- CANONICAL &amp; CAMPAIGN ENTRIES</div>

  <div id="alert" class="alert"></div>

  <div class="flex-bar mb-16">
    <div class="flex-row-10">
      <input type="text" id="filterInput" placeholder="Filter by code, region, or political entity..." style="width:360px" oninput="applyFilter()">
      <select id="filterContinent" onchange="applyFilter()" style="width:160px">
        <option value="">All Continents</option>
      </select>
    </div>
    <button class="btn btn-green gm-only" onclick="openModal()">+ New RTG</button>
  </div>

  <div id="tableWrap">
    <div class="loading">Loading RTGs</div>
  </div>
</main>

<!-- -- EDIT MODAL --------------------------------------- -->
<div id="editOverlay" class="edit-overlay" onclick="overlayClick(event)">
  <div class="edit-modal">
    <div class="edit-modal-head">
      <div class="edit-modal-title" id="modalTitle">New RTG</div>
      <button class="btn btn-red" onclick="closeModal()">x</button>
    </div>
    <div class="edit-modal-body">
      <div id="modalAlert" class="alert"></div>
      <div class="grid2 mb-14">
        <div class="field">
          <label>RTG Code *</label>
          <input type="text" id="f-code" placeholder="NA/UCAS-SEA" maxlength="50">
        </div>
        <div class="field">
          <label>Security Rating</label>
          <div style="display:flex;gap:6px">
            <select id="f-sec-code" style="flex:1">
              <option value="">-- Code --</option>
              <option value="Blue">Blue</option>
              <option value="Green">Green</option>
              <option value="Orange">Orange</option>
              <option value="Red">Red</option>
              <option value="Black">Black</option>
            </select>
            <input type="number" id="f-sec-value" min="2" max="14" step="1" placeholder="--" style="width:80px">
          </div>
        </div>
      </div>
      <div class="grid2 mb-14">
        <div class="field">
          <label>Region</label>
          <input type="text" id="f-region" placeholder="UCAS Pacific Northwest" maxlength="200">
        </div>
        <div class="field">
          <label>Political Entity</label>
          <input type="text" id="f-political_entity" placeholder="UCAS" maxlength="200">
        </div>
      </div>
      <div class="grid2 mb-14">
        <div class="field">
          <label>Continent</label>
          <input type="text" id="f-continent" placeholder="North America" maxlength="100">
        </div>
        <div class="field">
          <label>Canonical</label>
          <div class="toggle-wrap pt-6">
            <label class="toggle">
              <input type="checkbox" id="f-canonical" checked>
              <span class="tog-sl"></span>
            </label>
            <span class="tog-label">Canonical Entry</span>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" rows="3" placeholder="Campaign notes, special rules..."></textarea>
      </div>
    </div>
    <div class="edit-modal-foot">
      <button class="btn btn-red" id="deleteBtn" style="display:none" onclick="deleteRTG()">&gt;&gt; Delete</button>
    </div>
  </div>
</div>

<script>
const API = '';
let allRTGs = [];
let editingId = null;

// buildLTGCodeOpts / buildSecValOpts / parseSan live in shared.js

function ratingClass(r) {
  const c = (r||'').split('-')[0].toLowerCase();
  return {blue:'r-blue',green:'r-green',orange:'r-orange',red:'r-red',black:'r-black'}[c] || 'r-green';
}

// -- Render table ----------------------------------------------
let _lastRTGsHtml = null;
function renderTable(data) {
  const wrap = document.getElementById('tableWrap');
  let newHtml;
  if (!data.length) {
    newHtml = '<div class="loading">No RTGs found</div>';
  } else {
  newHtml = `
    <table class="manage-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Region</th>
          <th>Political Entity</th>
          <th>Continent</th>
          <th>Security Rating</th>
          <th>Type</th>
          <th class="td-act"></th>
        </tr>
      </thead>
      <tbody>
        ${data.map(r => `
          <tr>
            <td style="color:var(--green-dim);letter-spacing:1px">${esc(r.code)}</td>
            <td>${esc(r.region)}</td>
            <td class="text-dim">${esc(r.political_entity||'--')}</td>
            <td class="text-dim">${esc(r.continent||'--')}</td>
            <td>${r.rtg_security_rating ? `<span class="ltg-rating ${ratingClass(r.rtg_security_rating)}">${esc(r.rtg_security_rating)}</span>` : '<span style="color:#333">--</span>'}</td>
            <td style="color:var(--text-dim);font-size:.65rem;letter-spacing:1px">${r.canonical ? 'CANONICAL' : 'CAMPAIGN'}</td>
            <td class="td-act">${isAdminMode() ? `<button class="btn btn-amber btn-sm" onclick="openModal(${r.id})">Edit</button>` : ''}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  }
  if (newHtml === _lastRTGsHtml) return;
  _lastRTGsHtml = newHtml;
  wrap.innerHTML = newHtml;
}

function applyFilter() {
  const q    = document.getElementById('filterInput').value.toLowerCase();
  const cont = document.getElementById('filterContinent').value;
  const filtered = allRTGs.filter(r =>
    (!q    || r.code.toLowerCase().includes(q) || (r.region||'').toLowerCase().includes(q) || (r.political_entity||'').toLowerCase().includes(q)) &&
    (!cont || r.continent === cont)
  ).sort((a, b) => {
    const ca = (a.continent||'').localeCompare(b.continent||'');
    if (ca !== 0) return ca;
    const pa = (a.political_entity||'').localeCompare(b.political_entity||'');
    if (pa !== 0) return pa;
    return (a.region||'').localeCompare(b.region||'');
  });
  renderTable(filtered);
}

// -- Modal -----------------------------------------------------
function openModal(id) {
  editingId = id || null;
  const rtg = id ? allRTGs.find(r => r.id === id) : null;
  document.getElementById('modalTitle').textContent = rtg ? `Edit: ${rtg.code}` : 'New RTG';
  document.getElementById('deleteBtn').style.display = rtg ? '' : 'none';
  document.getElementById('modalAlert').className = 'alert';

  document.getElementById('f-code').value            = rtg?.code || '';
  document.getElementById('f-region').value          = rtg?.region || '';
  document.getElementById('f-political_entity').value= rtg?.political_entity || '';
  document.getElementById('f-continent').value       = rtg?.continent || '';
  const { code: rtgCode, value: rtgVal } = parseSan(rtg?.rtg_security_rating);
  document.getElementById('f-sec-code').value = rtgCode;
  document.getElementById('f-sec-value').value = rtgVal || '';
  document.getElementById('f-canonical').checked     = rtg?.canonical !== false;
  document.getElementById('f-notes').value           = rtg?.notes || '';

  pausePoll();
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  rtgAutoSave.arm();
}

function closeModal() {
  rtgAutoSave.disarm();
  resumePoll();
  document.getElementById('editOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function overlayClick(e) {
  if (e.target === document.getElementById('editOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// -- Auto-save: create-on-first-valid-field, then silent PATCH on each edit. -----
function rtgPayload() {
  return {
    code:             document.getElementById('f-code').value.trim(),
    region:           document.getElementById('f-region').value.trim() || null,
    political_entity: document.getElementById('f-political_entity').value.trim() || null,
    continent:        document.getElementById('f-continent').value.trim() || null,
    rtg_security_rating: (() => {
      const c = document.getElementById('f-sec-code').value;
      const v = document.getElementById('f-sec-value').value;
      return (c && v) ? `${c}-${v}` : null;
    })(),
    canonical:        document.getElementById('f-canonical').checked,
    notes:            document.getElementById('f-notes').value.trim() || null,
  };
}

async function commitRTG(isCreate) {
  const url    = isCreate ? `${API}/rtgs/` : `${API}/rtgs/${editingId}`;
  const method = isCreate ? 'POST' : 'PATCH';
  const res = await apiFetch(url, { method, body: JSON.stringify(rtgPayload()) });
  if (!res.ok) await apiThrow(res);
  const saved = await res.json();

  if (isCreate) {
    editingId = saved.id;
    document.getElementById('deleteBtn').style.display = '';
  }
  document.getElementById('modalTitle').textContent = `Edit: ${saved.code}`;

  // Silent local update -- no modal close, no full reload (poll is paused while open).
  const i = allRTGs.findIndex(r => r.id === saved.id);
  if (i >= 0) allRTGs[i] = saved; else allRTGs.push(saved);
  applyFilter();
}

const rtgAutoSave = makeManageAutoSave({
  overlayId: 'editOverlay',
  statusId:  'rtgSaveStatus',
  foot:      () => document.querySelector('#editOverlay .edit-modal-foot'),
  idleMsg:   'Code + Region required to auto-save',
  active:    () => isAdminMode(),
  valid:     () => !!document.getElementById('f-code').value.trim()
                && !!document.getElementById('f-region').value.trim(),
  editingId: () => editingId,
  commit:    commitRTG,
});

async function deleteRTG() {
  if (!editingId) return;
  const code = document.getElementById('f-code').value;
    if (!await showConfirm(`DELETE RTG "${code}"? This cannot be undone.`, 'Delete')) return;
  try {
    const res = await apiFetch(`${API}/rtgs/${editingId}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 204) await apiThrow(res);
    closeModal();
    showAlert(document.getElementById('alert'), `>> PURGED // RTG "${code}" deleted.`, false);
    await loadRTGs();
  } catch(e) {
    showAlert(document.getElementById('modalAlert'), `>> DELETE FAILED // ${e.message}`, true);
  }
}

// -- Load data -------------------------------------------------
async function loadRTGs() {
  try {
    const res = await apiFetch(`${API}/rtgs/`);
    if (!res.ok) await apiThrow(res);
    allRTGs = await res.json();

    // Build continent filter options
    const continents = [...new Set(allRTGs.map(r => r.continent).filter(Boolean))].sort();
    const sel = document.getElementById('filterContinent');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Continents</option>' +
      continents.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
    if (cur) sel.value = cur;

    applyFilter();
  } catch(e) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="alert alert-err show">>> CONNECTION FAILED // ${e.message}</div>`;
  }
}

bootstrapAuth().then(u => { if (u) { loadRTGs(); startPolling(loadRTGs); } });
</script>
</body>
</html>
